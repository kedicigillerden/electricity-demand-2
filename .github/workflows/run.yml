name: Run Patched Model

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-model:
    runs-on: ubuntu-latest

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas numpy matplotlib statsmodels openpyxl

      - name: Patch uygula
        run: |
          sed -n '/^--- a\/talep_tahmin_tek_dosya.py/,$p' patches/add-economic-interaction-models.patch > clean.patch
          git apply clean.patch

      - name: Modeli calistir
        run: |
          python talep_tahmin_tek_dosya.py

      - name: Outputlari commit et
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outputs/
          git commit -m "Generate patched model outputs" || echo "No changes"
          git push
