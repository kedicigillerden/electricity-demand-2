name: Run Patched Model

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-model:
    runs-on: ubuntu-latest

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas numpy matplotlib statsmodels openpyxl

      - name: Interaction kodunu ana dosyaya uygula
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path("talep_tahmin_tek_dosya.py")
          text = p.read_text(encoding="utf-8")

          text = text.replace(
              'ALL_CONTINUOUS_COLUMNS = ["HDD", "CDD", "PMI", "IR", "CUR"]',
              '''ALL_CONTINUOUS_COLUMNS = [
              "HDD", "CDD", "PMI", "IR", "CUR",
              "PMI_c", "IR_c", "CUR_c",
              "PMI_IR", "CUR_IR", "PMI_CUR",
          ]'''
          )

          if 'df["PMI_IR"]' not in text:
              text = text.replace(
                  '''    econ = load_economic_data()
              df = df.merge(econ, on="year_month", how="left")
              return df''',
                  '''    econ = load_economic_data()
              df = df.merge(econ, on="year_month", how="left")

              for column in ("PMI", "IR", "CUR"):
                  df[f"{column}_c"] = df[column] - df[column].mean()

              df["PMI_IR"] = df["PMI_c"] * df["IR_c"]
              df["CUR_IR"] = df["CUR_c"] * df["IR_c"]
              df["PMI_CUR"] = df["PMI_c"] * df["CUR_c"]

              return df'''
              )

          if '"model_id": "model_9"' not in text:
              models = '''
              {
                  "model_id": "model_9",
                  "prompt": "TABLE 9 - consumption ~ HDD + CDD + night dummy + weekend dummy + PMI_c + IR_c + PMI_IR",
                  "y_col": "consumption",
                  "features": ["HDD", "CDD", "night", "weekend", "PMI_c", "IR_c", "PMI_IR"],
                  "use_month_dummies": False,
              },
              {
                  "model_id": "model_10",
                  "prompt": "TABLE 10 - consumption ~ HDD + CDD + night dummy + weekend dummy + PMI_c + IR_c + CUR_c + PMI_IR + CUR_IR",
                  "y_col": "consumption",
                  "features": ["HDD", "CDD", "night", "weekend", "PMI_c", "IR_c", "CUR_c", "PMI_IR", "CUR_IR"],
                  "use_month_dummies": False,
              },
              {
                  "model_id": "model_11",
                  "prompt": "TABLE 11 - consumption ~ HDD + CDD + night dummy + weekend dummy + PMI_c + IR_c + CUR_c + PMI_IR + CUR_IR + PMI_CUR",
                  "y_col": "consumption",
                  "features": ["HDD", "CDD", "night", "weekend", "PMI_c", "IR_c", "CUR_c", "PMI_IR", "CUR_IR", "PMI_CUR"],
                  "use_month_dummies": False,
              },
          '''
              text = text.replace("\n    ]\n\n\ndef fit_single_model", models + "\n    ]\n\n\ndef fit_single_model")

          p.write_text(text, encoding="utf-8")
          PY

      - name: Modeli calistir
        run: |
          python talep_tahmin_tek_dosya.py

      - name: Outputlari commit et
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outputs/
          git commit -m "Generate patched model outputs" || echo "No changes"
          git push
